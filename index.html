<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clash of Clans - New Hero Arrival</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 class="main-title">
    <span class="title-animated">⚔️ Clash of Clans</span>
    <span class="subtitle-animated">New Hero Arrival</span>
  </h1>

  <nav>
    <a href="https://clashofclans.com" target="_blank">Official</a>
    <a href="https://twitter.com/ClashofClans" target="_blank">Twitter</a>
    <a href="https://www.youtube.com/@ClashofClans" target="_blank">YouTube</a>
  </nav>
</header>

<section class="event-section">

  <h2 class="live-title">
    🔥 Live Event Countdown
    <span class="live-badge">LIVE TODAY</span>
  </h2>

  <div class="countdown-container">
    <div class="time-box"><span id="days">0</span><p>Days</p></div>
    <div class="time-box"><span id="hours">0</span><p>Hours</p></div>
    <div class="time-box"><span id="minutes">0</span><p>Minutes</p></div>
    <div class="time-box"><span id="seconds">0</span><p>Seconds</p></div>
  </div>

  <div id="countdownMessage"></div>

  <div class="hero-container">
    <img src="hero.jpeg" id="heroImage" alt="New Hero">
    
    <img src="new updates.jpeg" id="heroImage" alt="New Hero">
  </div>

</section>

<div id="flash"></div>

<footer>
  <p>© 2026 Clash of Clans Fan Event | All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
