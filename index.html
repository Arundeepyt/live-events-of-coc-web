<!-- ================= NEW HERO LIVE ARRIVAL ================= -->

<section class="hero-arrival">

  <div class="arrival-header">
    <span class="arrival-dot"></span>
    <span class="arrival-live">LIVE HERO ARRIVAL</span>
  </div>

  <h2 class="hero-title">🔥 SHADOW WARDEN ARRIVES 🔥</h2>

  <!-- HERO IMAGE -->
  <div class="hero-image-wrapper">
    <img src="hero.png" class="hero-image" id="heroImage" alt="DUKE DRAGON HERO">
  </div>

  <p class="hero-desc">
    Master of dark magic and battlefield domination.
  </p>

  <div class="countdown" id="countdown">
    <div><span id="days">00</span><p>Days</p></div>
    <div><span id="hours">00</span><p>Hours</p></div>
    <div><span id="minutes">00</span><p>Minutes</p></div>
    <div><span id="seconds">00</span><p>Seconds</p></div>
  </div>

  <button class="reveal-btn">⚔ Watch Reveal</button>

</section>

<!-- LIGHT FLASH EFFECT -->
<div class="light-flash" id="lightFlash"></div>
