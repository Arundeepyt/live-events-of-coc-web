<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Clash of Clans New Hero Arrival Live Countdown Event">
  <meta name="keywords" content="Clash of Clans, New Hero, Live Event, Countdown">
  <meta name="author" content="Arun Deep">

  <title>Clash of Clans - New Hero Arrival</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= PARTICLES ================= -->
<div class="particles">
  <span style="left:5%; animation-delay:0s;"></span>
  <span style="left:20%; animation-delay:3s;"></span>
  <span style="left:35%; animation-delay:6s;"></span>
  <span style="left:50%; animation-delay:9s;"></span>
  <span style="left:65%; animation-delay:12s;"></span>
  <span style="left:80%; animation-delay:15s;"></span>
  <span style="left:95%; animation-delay:18s;"></span>
</div>

<!-- ================= HEADER ================= -->
<header>
  <h1 class="main-title">
    <span class="title-animated">⚔️ Clash of Clans</span>
    <span class="subtitle-animated">New Hero Arrival</span>
  </h1>

  <nav>
    <a href="https://clashofclans.com" target="_blank">Official</a>
    <a href="https://twitter.com/ClashofClans" target="_blank">Twitter</a>
    <a href="https://www.youtube.com/@ClashofClans" target="_blank">YouTube</a>
  </nav>
</header>

<!-- ================= EVENT SECTION ================= -->
<section class="event-section">

  <h2 class="live-title">
    🔥 Live Event Countdown
    <span class="live-badge">LIVE TOMORROW</span>
  </h2>

  <div class="countdown-container">
    <div class="time-box">
      <span id="days">0</span>
      <p>Days</p>
    </div>

    <div class="time-box">
      <span id="hours">0</span>
      <p>Hours</p>
    </div>

    <div class="time-box">
      <span id="minutes">0</span>
      <p>Minutes</p>
    </div>

    <div class="time-box">
      <span id="seconds">0</span>
      <p>Seconds</p>
    </div>
  </div>

  <div id="countdownMessage"></div>

  <div class="hero-container">
    <img src="hero.jpeg" id="heroImage" alt="Clash of Clans New Hero">
  </div>

</section>

<!-- Flash Effect -->
<div id="flash"></div>

<!-- ================= FOOTER ================= -->
<footer>
  <p>© 2026 Clash of Clans Fan Event | Designed by Arun Deep</p>
</footer>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
